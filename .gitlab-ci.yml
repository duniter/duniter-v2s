# Runner tags:
# - podman: use 'podman' to build multiplatform images

stages:
  - labels
  - dependencies
  - metadata
  - schedule
  - quality
  - build
  - tests
  - release
  - deploy
  - deploy_readme

variables:
  CI_UNIFIED_IMAGE: paritytech/ci-unified:bullseye-1.88.0
  DUNITER_POLKADOT_SDK_URL: https://github.com/duniter/duniter-polkadot-sdk

default:
  interruptible: true

# Job templates for release builds (without tags/image, set by jobs)
.release_rules:
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG =~ /^[a-zA-Z0-9]+-[0-9]+-[0-9]+\.[0-9]+\.[0-9]+$/ && $CI_COMMIT_REF_PROTECTED == "true"'
      when: on_success
    - when: never

.debian_build_template:
  extends:
    - .release_rules
    - .with_dependencies
  needs:
    - job: toolchain_sync_check
    - job: sdk_resolve
      artifacts: true
    - job: generate_metadata
      artifacts: true
  before_script:
    # Install build dependencies and tools to patch embedded raw specs in CI
    - apt-get update -qq && apt-get install -y -qq protobuf-compiler clang libclang-dev curl jq
  script:
    - rm -f target/release/duniter target/release/distance-oracle
    - source scripts/parse_release_tag.sh
    - bash scripts/prepare_embedded_raw_spec.sh
    - ./scripts/cargo_with_vendor.sh xtask client-build-deb "$NETWORK"

.rpm_build_template:
  extends:
    - .release_rules
    - .with_dependencies
  needs:
    - job: toolchain_sync_check
    - job: sdk_resolve
      artifacts: true
    - job: generate_metadata
      artifacts: true
  before_script:
    # Install RPM build tools and dependencies to patch embedded raw specs in CI
    - apt-get update -qq && apt-get install -y -qq rpm protobuf-compiler clang libclang-dev curl jq
  script:
    - rm -f target/release/duniter target/release/distance-oracle
    - source scripts/parse_release_tag.sh
    - bash scripts/prepare_embedded_raw_spec.sh
    - ./scripts/cargo_with_vendor.sh xtask client-build-rpm "$NETWORK"

.docker_deploy_template:
  extends:
    - .release_rules
  needs:
    - job: toolchain_sync_check
    - job: sdk_resolve
      artifacts: true
    - job: generate_metadata
      artifacts: true
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    # Install Rust and build dependencies to patch embedded raw specs in CI
    - apk add --no-cache curl bash gcc musl-dev jq
    - export RUST_STABLE_VERSION="${CI_UNIFIED_IMAGE##*-}"
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "${RUST_STABLE_VERSION}" --profile minimal
    - source $HOME/.cargo/env
    - docker info
  script:
    - source scripts/parse_release_tag.sh
    - bash scripts/prepare_embedded_raw_spec.sh
    - ./scripts/cargo_with_vendor.sh xtask client-docker-deploy "$NETWORK" --arch "$ARCH"

# Release build jobs
release_debian_arm:
  extends:
    - .env_arm
    - .debian_build_template
  artifacts:
    paths:
      - target/debian/*.deb

release_debian_x64:
  extends:
    - .env
    - .debian_build_template
  artifacts:
    paths:
      - target/debian/*.deb

release_rpm_arm:
  extends:
    - .env_arm
    - .rpm_build_template
  artifacts:
    paths:
      - target/generate-rpm/*.rpm

release_rpm_x64:
  extends:
    - .env
    - .rpm_build_template
  artifacts:
    paths:
      - target/generate-rpm/*.rpm

release_docker_arm:
  extends: .docker_deploy_template
  tags:
    - linuxARM
  variables:
    ARCH: arm64

release_docker_x64:
  extends: .docker_deploy_template
  tags:
    - kepler
  variables:
    ARCH: amd64

release_docker_manifest:
  stage: release
  extends: .release_rules
  needs:
    - job: release_docker_arm
      optional: false
    - job: release_docker_x64
      optional: false
  tags:
    - kepler
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - apk add --no-cache bash grep sed jq curl
  script:
    - source scripts/parse_release_tag.sh
    - docker login -u duniterteam -p $DUNITERTEAM_PASSWD docker.io
    - |
      # Extract runtime from NETWORK (e.g., gtest-1100 -> gtest)
      RUNTIME=$(echo $NETWORK | sed 's/-[0-9].*//')

      # Get runtime version from runtime/$RUNTIME/src/lib.rs
      RUNTIME_VERSION=$(grep 'spec_version:' runtime/$RUNTIME/src/lib.rs | sed 's/.*spec_version: \([0-9]*\).*/\1/')

      IMAGE_NAME="duniter/duniter-${NETWORK}"
      TAG="${RUNTIME_VERSION}-${CLIENT_VERSION}"

      echo "Creating multi-arch manifest for ${IMAGE_NAME}:${TAG}"

      # Use buildx imagetools to create multi-arch tags from existing images
      # This works even if the source images are manifest lists
      docker buildx imagetools create \
        --tag ${IMAGE_NAME}:${TAG} \
        ${IMAGE_NAME}:${TAG}-amd64 \
        ${IMAGE_NAME}:${TAG}-arm64

      echo "✅ Multi-arch tag created: ${IMAGE_NAME}:${TAG}"

      # Also create :latest tag
      docker buildx imagetools create \
        --tag ${IMAGE_NAME}:latest \
        ${IMAGE_NAME}:${TAG}-amd64 \
        ${IMAGE_NAME}:${TAG}-arm64

      echo "✅ Multi-arch tag created: ${IMAGE_NAME}:latest"

release_gitlab_page:
  stage: release
  extends: .release_rules
  tags:
    - kepler
  needs:
    - job: release_debian_arm
      artifacts: true
    - job: release_debian_x64
      artifacts: true
    - job: release_rpm_arm
      artifacts: true
    - job: release_rpm_x64
      artifacts: true
    - job: release_docker_manifest
      artifacts: false
  image: alpine:latest
  before_script:
    - apk add --no-cache bash curl jq
  script:
    - bash scripts/create_gitlab_client_release.sh
  artifacts:
    when: always
    expire_in: never
    paths:
      - release/client-assets/*

workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: '$CI_COMMIT_TAG =~ /^[a-zA-Z0-9]+-[0-9]+-[0-9]+\.[0-9]+\.[0-9]+$/ && $CI_COMMIT_REF_PROTECTED == "true"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_TAG =~ /^[a-zA-Z0-9]+-[0-9]+$/'
      when: never
    - when: never

sanity_tests:
  extends:
    - .env
    - .with_dependencies
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TOPIC=="sanity-tests"'
    - when: never
  stage: schedule
  script:
    - ./scripts/cargo_with_vendor.sh sanity-${CURRENCY}

check_labels:
  extends: .env
  stage: labels
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - when: never
  script:
    - ./scripts/check_labels.sh $CI_MERGE_REQUEST_LABELS $CI_MERGE_REQUEST_MILESTONE

generate_metadata:
  extends:
    - .env
    - .with_dependencies
  stage: metadata
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^wip*$/
      when: manual
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - if: '$CI_MERGE_REQUEST_ID'
      when: on_success
    - if: '$CI_COMMIT_TAG =~ /^[a-zA-Z0-9]+-[0-9]+-[0-9]+\.[0-9]+\.[0-9]+$/ && $CI_COMMIT_REF_PROTECTED == "true"'
      when: on_success
    - when: never
  script:
    - if ! command -v subxt >/dev/null 2>&1; then cargo install subxt-cli; fi
    - |
      if [[ "$CI_COMMIT_TAG" != "" && "$CI_COMMIT_REF_PROTECTED" == "true" ]]; then
        if ! printf '%s\n' "$CI_COMMIT_TAG" | grep -Eq '^[a-zA-Z0-9]+-[0-9]+-[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "Invalid release tag '${CI_COMMIT_TAG}' (expected SPEC_NAME-SPEC_VERSION-BINARY_VERSION, e.g. g1-1200-2.0.0)"
          exit 1
        fi
        METADATA_CHAINS="g1 gtest"
      else
        METADATA_CHAINS="gdev gtest"
      fi
      METADATA_CHAINS="$METADATA_CHAINS" ./scripts/generate_all_metadata.sh
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - resources/*_metadata.scale

toolchain_sync_check:
  extends: .env
  stage: dependencies
  rules:
    - if: '$CI_MERGE_REQUEST_ID || $CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
    - if: $CI_PIPELINE_SOURCE == "push"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
    - when: never
  script:
    - ./scripts/check_toolchain_sync.sh "$CI_UNIFIED_IMAGE"

sdk_resolve:
  extends: .env
  stage: dependencies
  needs:
    - job: toolchain_sync_check
      artifacts: false
  rules:
    - if: '$CI_MERGE_REQUEST_ID || $CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
    - if: $CI_PIPELINE_SOURCE == "push"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
    - when: never
  script:
    - ./scripts/prepare_local_polkadot_sdk.sh Cargo.lock duniter-polkadot-sdk.git
    - du -sh duniter-polkadot-sdk.git || true
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - duniter-polkadot-sdk.git/
      - local-sdk.env

.env:
  image: $CI_UNIFIED_IMAGE
  tags:
    - kepler

.with_dependencies:
  needs:
    - job: toolchain_sync_check
    - job: sdk_resolve
      artifacts: true

.env_arm:
  image: rust:1.88.0-bullseye  # Pinned to match CI unified image Rust version and amd64 release libc baseline
  tags:
    - linuxARM

fmt_and_clippy:
  extends:
    - .env
  dependencies:
    - sdk_resolve
    - generate_metadata
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^wip*$/
      when: manual
    - if: '$CI_COMMIT_TAG || $CI_COMMIT_BRANCH == "master"'
      when: never
    - if: '$CI_COMMIT_TAG != "" && $CI_COMMIT_REF_PROTECTED == "true"'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - when: manual
  stage: quality
  script:
    - ./scripts/cargo_with_vendor.sh fmt -- --version
    - ./scripts/cargo_with_vendor.sh fmt -- --check
    - ./scripts/cargo_with_vendor.sh clippy -- -V
    - ./scripts/cargo_with_vendor.sh clippy --all --tests -- -D warnings

.benchmarks_rules:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: '$CI_MERGE_REQUEST_ID || $CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - '**/benchmarking.rs'
        - Cargo.toml
        - Cargo.lock
    - when: never

publish_omni_bencher:
  extends:
    - .env
    - .with_dependencies
    - .benchmarks_rules
  stage: build
  artifacts:
    paths:
      - target/frame-omni-bencher.gz
    expire_in: 1 week
  script:
    - bash ./scripts/publish_omni_bencher.sh

check_benchmarks:
  extends:
    - .env
    - .with_dependencies
    - .benchmarks_rules
  stage: tests
  needs:
    - job: toolchain_sync_check
    - job: sdk_resolve
      artifacts: true
    - job: publish_omni_bencher
      artifacts: true
  script:
    - bash ./scripts/check_benchmarks_ci.sh

gtest_build:
  stage: build
  extends:
    - .env
    - .with_dependencies
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^wip*$/
      when: manual
    - if: $CI_COMMIT_TAG
      when: never
    - if: '$CI_MERGE_REQUEST_ID || $CI_COMMIT_BRANCH == "master"'
    - when: manual
  variables:
    DEBIAN_FRONTEND: noninteractive
  needs:
    - job: toolchain_sync_check
    - job: sdk_resolve
      artifacts: true
    - job: generate_metadata
      artifacts: true
  script:
    - ./scripts/cargo_with_vendor.sh build --no-default-features --features gtest -p duniter

.tests_template:
  stage: tests
  extends:
    - .env
    - .with_dependencies
  needs:
    - job: toolchain_sync_check
    - job: sdk_resolve
      artifacts: true
    - job: generate_metadata
      artifacts: true
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^wip*$/
      when: manual
    - if: $CI_COMMIT_TAG
      when: never
    - if: '$CI_MERGE_REQUEST_ID || $CI_COMMIT_BRANCH == "master"'
    - when: manual
  variables:
    DEBIAN_FRONTEND: noninteractive

tests_gdev:
  extends: .tests_template
  script:
    - export RUST_MIN_STACK=16777216 # 16MB stack size otherwise CI fail during LLVM's Thin LTO (Link Time Optimization) phase
    - ./scripts/cargo_with_vendor.sh tu --features gdev --exclude g1-runtime --exclude gtest-runtime
    - ./scripts/cargo_with_vendor.sh tf --features gdev --exclude g1-runtime --exclude gtest-runtime

tests_gtest:
  extends: .tests_template
  script:
    - export RUST_MIN_STACK=16777216 # 16MB stack size otherwise CI fail during LLVM's Thin LTO (Link Time Optimization) phase
    - ./scripts/cargo_with_vendor.sh tu --no-default-features --features gtest,std,standalone --exclude g1-runtime --exclude gdev-runtime
    - ./scripts/cargo_with_vendor.sh tf --no-default-features --features gtest,std,standalone --exclude g1-runtime --exclude gdev-runtime

tests_cucumber:
  extends: .tests_template
  script:
    - ./scripts/cargo_with_vendor.sh cucumber-build
    - ./scripts/cargo_with_vendor.sh cucumber
